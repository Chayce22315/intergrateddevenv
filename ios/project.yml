name: IntegratedDevEnv
options:
  bundleIdPrefix: com.integrateddevenv
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    branch: main

targets:
  IntegratedDevEnv:
    type: application
    platform: iOS
    sources:
      - path: IntegratedDevEnv
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        INFOPLIST_FILE: IntegratedDevEnv/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.integrateddevenv.app
        PRODUCT_NAME: IntegratedDevEnv
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
